document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    // Nested page bundles (iframe targets). Each ships ONCE, in the ROOT
    // document's manifest; frame srcs carry an about:blank#<uuid> marker
    // instead of a substitutable uuid. Every document mints the blobs for
    // its OWN frames — from local text at the root, or text obtained from
    // its DIRECT parent over the relay protocol below — so each frame
    // navigation stays same-origin with its initiator and a deduped page
    // loads at any depth on any host, including a file:// download's
    // opaque origins (where a blob minted by one document cannot be
    // navigated to by another).
    const pageOrderEl = document.querySelector('script[type="__bundler/page_order"]');
    const pageOrder = pageOrderEl ? JSON.parse(pageOrderEl.textContent) : [];
    const pageSet = new Set(pageOrder);
    const pageTexts = {};

    // ── Nested-page text protocol (parent-chain relay) ──
    // Page bundles ship once, in the ROOT document's manifest. Every
    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends
    // upward at all. That last rule is load-bearing: the artifact host's
    // frame-ancestors allows claude.ai (and friends) to frame an
    // artifact, so window.top can be a FOREIGN document — a top-addressed
    // protocol would hand page uuids to that ancestor and accept forged
    // "page text" from it, minting attacker HTML as an artifact-origin
    // blob document. The chain never touches the ancestor: requests stop
    // at the root, replies are origin-addressed per hop (never '*' when
    // an origin exists), and both directions are origin-gated (on https
    // a foreign sender's origin can never equal this document's; in
    // opaque contexts — file:// — everything serializes as 'null', where
    // an embedded EXTERNAL frame still fails the gate by carrying its
    // own real origin, and a sandboxed child of such a frame is excluded
    // by the own-child-frames check plus uuid unguessability). Shape is
    // deny-by-default: one request form, one reply form, no error
    // replies.
    // window.origin is the SERIALIZED SECURITY origin ('null' in opaque
    // contexts such as a sandboxed preview iframe) — location.origin is
    // computed from the URL and stays 'https://…' even when the document
    // is sandboxed, which would misgate every opaque chain.
    const OWN_TARGET = /^https?:[/][/]/.test(window.origin || '')
      ? window.origin
      : '*';
    function trustedOrigin(e) {
      if (e.origin === window.origin) return true; // https chains; opaque==opaque
      // file:// trees: Chrome serializes the file document's origin as
      // 'file://' while the blob: documents it mints serialize as 'null',
      // so the two legitimate shapes can never string-match — accept the
      // pair in both directions. https origins never serialize as either,
      // and sender identity (own child frame / direct parent) is checked
      // separately.
      return (
        (e.origin === 'null' &&
          (window.origin === 'file://' ||
            window.location.protocol === 'file:')) ||
        (/^file:/.test(e.origin) && window.origin === 'null')
      );
    }
    // Non-empty only in the root document (nested bundles ship an empty
    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.
    const isPageRoot = pageOrder.length > 0;
    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down
    function mountPage(el, frag, text) {
      const pageBlob = new Blob([text], { type: 'text/html' });
      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }
    }
    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }
      }
      return out;
    }
    window.addEventListener('message', function (e) {
      const d = e.data;
      if (!d || typeof d !== 'object' || !e.source) return;
      // Origin gate first; the structural checks below (own-child-frames
      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;
        const uuid = d.__bundler_need;
        const text = pageTexts[uuid];
        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
          return;
        }
        if (isPageRoot || window.parent === window) return; // authoritative miss
        const waiting = pendingRelays[uuid];
        if (waiting) {
          if (waiting.indexOf(e.source) < 0) waiting.push(e.source);
          return;
        }
        // Never-answered uuids would otherwise accumulate forever under a
        // request spray; past the cap (far above any real page count) new
        // relays are dropped rather than remembered.
        if (Object.keys(pendingRelays).length >= 128) return;
        pendingRelays[uuid] = [e.source];
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      } else if (
        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'
      ) {
        // The shape test is load-bearing beyond tidiness: the solicited
        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent — the document
        // that minted this one.
        if (e.source !== window.parent || window.parent === window) return;
        if (!(d.__bundler_page in pendingFrames) && !(d.__bundler_page in pendingRelays)) return;
        deliverPage(d.__bundler_page, d.__bundler_text);
      }
    });

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (pageSet.has(uuid)) {
          pageTexts[uuid] = new TextDecoder().decode(finalBytes);
          return;
        }
        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    // Page uuids have no blob here — they ride inside about:blank#<uuid>
    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {
      if (pageSet.has(uuid)) continue;
      template = template.split(uuid).join(blobUrls[uuid]);
    }

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }
    }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ation:none}\n  input,textarea,button{font-family:'Archivo',sans-serif}\n  input:focus,textarea:focus{outline:none;border-color:#e8608a !important}\n  @keyframes flo-marq{to{transform:translateX(-50%)}}\n  [data-view]{display:none}\n  [data-view].active{display:block}\n<\u002Fstyle>\n\n<\u002Fhead>\n<body>\n\n<div id=\"flo-site\" style=\"max-width:100%;overflow-x:hidden\">\n\n<!-- ===== HEADER (shared) ===== -->\n<header style=\"position:sticky;top:0;z-index:50;display:flex;align-items:center;justify-content:space-between;padding:16px 40px;background:#1a1a1a;border-bottom:1px solid rgba(255,255,255,.1)\">\n  <a href=\"#home\" style=\"display:flex;flex-direction:column;gap:1px\">\n    <span style=\"font:800 17px 'Bricolage Grotesque',sans-serif;letter-spacing:-.01em;color:#f4ede4\">Florencia Bugarin D'Angelo<\u002Fspan>\n    <span style=\"font:400 10px 'Space Mono',monospace;letter-spacing:.14em;color:#b0a690;text-transform:uppercase\">Performance Marketing · Growth<\u002Fspan>\n  <\u002Fa>\n  <nav style=\"display:flex;align-items:center;gap:26px\">\n    <a href=\"#servicios\" style=\"font:600 13px 'Archivo';color:#d8cfc0\">Servicios<\u002Fa>\n    <a href=\"#trabajo\" style=\"font:600 13px 'Archivo';color:#d8cfc0\">Cómo trabajo<\u002Fa>\n    <a href=\"#blog\" style=\"font:600 13px 'Archivo';color:#d8cfc0\">Blog<\u002Fa>\n    <a href=\"#contacto\" style=\"padding:9px 18px;background:#e8608a;color:#fff;border-radius:22px;font:700 13px 'Archivo'\">Trabajemos juntos<\u002Fa>\n  <\u002Fnav>\n<\u002Fheader>\n\n<!-- ===== VIEW: HOME ===== -->\n<div data-view=\"home\">\n<span id=\"top\"><\u002Fspan>\n\n<section style=\"padding:66px 40px 0;position:relative;max-width:1180px;margin:0 auto\">\n  <span style=\"font:400 12px 'Space Mono',monospace;letter-spacing:.16em;color:#2f5d4a;text-transform:uppercase\">10 años · Meta &amp; Google Ads · Worldwide<\u002Fspan>\n  <div style=\"display:flex;align-items:center;justify-content:space-between;gap:40px;flex-wrap:wrap;margin-top:18px\">\n    <h1 style=\"font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:96px;line-height:.92;letter-spacing:-.035em;margin:0;max-width:640px\">Marketing que<br>se paga con<br><span style=\"color:#e8608a;font-style:italic\">resultados<span style=\"color:#2f5d4a;font-style:normal\">.<\u002Fspan><\u002Fspan><span style=\"display:inline-block;color:#2f5d4a;font-size:50px;vertical-align:top;margin-left:8px\">✳<\u002Fspan><\u002Fh1>\n    <div style=\"flex:none;background:#fff;border:1px solid rgba(0,0,0,.08);border-radius:16px;padding:24px 26px;box-shadow:0 14px 38px rgba(40,25,10,.12);display:flex;flex-direction:column;gap:14px;max-width:360px;width:360px\">\n      <span style=\"font:700 12px 'Space Mono',monospace;letter-spacing:.2em;color:#2f5d4a;text-transform:uppercase\">Inversión que escala<\u002Fspan>\n      <svg viewBox=\"0 0 168 100\" fill=\"none\" xmlns=\"http://www.w3.org/2000/svg\" style=\"width:100%;height:auto;display:block\">\n        <rect x=\"6\" y=\"62\" width=\"28\" height=\"32\" rx=\"5\" fill=\"#bcd0c4\"><\u002Frect>\n        <rect x=\"46\" y=\"46\" width=\"28\" height=\"48\" rx=\"5\" fill=\"#7fa591\"><\u002Frect>\n        <rect x=\"86\" y=\"28\" width=\"28\" height=\"66\" rx=\"5\" fill=\"#2f5d4a\"><\u002Frect>\n        <rect x=\"126\" y=\"10\" width=\"28\" height=\"84\" rx=\"5\" fill=\"#e8608a\"><\u002Frect>\n        <path d=\"M14 68 L56 52 L96 34 L140 14\" stroke=\"#1a1a1a\" stroke-width=\"3.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath>\n        <path d=\"M128 10 L143 11 L136 24 Z\" fill=\"#1a1a1a\"><\u002Fpath>\n      <\u002Fsvg>\n      <span style=\"font:600 16px/1.4 'Archivo';color:#3a3229\">Crecemos el presupuesto a medida que llegan los resultados.<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"margin-top:46px;text-align:center\">\n    <p style=\"font:500 21px/1.6 'Archivo';color:#3a3229;max-width:920px;margin:0 auto\"><b>Tu marca no invierte por invertir:<\u002Fb> invierte a medida que ve resultados reales, empezando con foco y escalando desde ahí. Estrategia de marketing de resultados a medida para emprendedores y marcas que quieren vender más, sin invertir de más.<\u002Fp>\n    <div style=\"display:flex;gap:16px;align-items:center;justify-content:center;margin-top:26px\">\n      <a href=\"#contacto\" style=\"padding:15px 28px;background:#1a1a1a;color:#f4ede4;border-radius:30px;font:700 15px 'Archivo'\">Hablemos<\u002Fa>\n      <a href=\"#servicios\" style=\"padding:15px 28px;border:1px solid rgba(0,0,0,.25);border-radius:30px;font:700 15px 'Archivo'\">Servicios<\u002Fa>\n    <\u002Fdiv>\n    <div style=\"margin-top:18px;display:flex;justify-content:center\">\n      <a href=\"https://linkedin.com/in/florenciabugarin\" target=\"_blank\" rel=\"noopener\" style=\"display:inline-flex;align-items:center;gap:8px;font:600 14px 'Archivo';color:#2f5d4a;border-bottom:2px solid rgba(47,93,74,.4);padding-bottom:2px\"><span style=\"font:700 12px 'Space Mono',monospace;color:#2f5d4a\">in<\u002Fspan><span>Conectemos en LinkedIn<\u002Fspan><\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"margin-top:14px;width:100vw;margin-left:calc(50% - 50vw);background:#1a1a1a;overflow:hidden;padding:34px 0\">\n    <div style=\"padding:0 34px 20px\"><span style=\"font:400 11px 'Space Mono',monospace;letter-spacing:.16em;color:#8a8070;text-transform:uppercase\">Plataformas &amp; herramientas con las que trabajo<\u002Fspan><\u002Fdiv>\n    <div style=\"display:flex;width:max-content;animation:flo-marq 32s linear infinite;font:700 18px 'Space Mono',monospace;color:#f4ede4\">\n      <div style=\"display:flex;gap:20px;padding-right:20px;align-items:center\"><span style=\"color:#e8608a\">Meta Ads<\u002Fspan><span style=\"color:#5a5245\">✳<\u002Fspan><span>Google Ads<\u002Fspan><span style=\"color:#5a5245\">✳<\u002Fspan><span style=\"color:#f2c94c\">YouTube Ads<\u002Fspan><span style=\"color:#5a5245\">✳<\u002Fspan><span>Google Analytics<\u002Fspan><span style=\"color:#5a5245\">✳<\u002Fspan><span style=\"color:#a9c4b5\">Search Console<\u002Fspan><span style=\"color:#5a5245\">✳<\u002Fspan><span>Tag Manager<\u002Fspan><span style=\"color:#5a5245\">✳<\u002Fspan><span style=\"color:#e8608a\">Looker Studio<\u002Fspan><span style=\"color:#5a5245\">✳<\u002Fspan><span>Power BI<\u002Fspan><span style=\"color:#5a5245\">✳<\u002Fspan><span style=\"color:#f2c94c\">SEMrush<\u002Fspan><span style=\"color:#5a5245\">✳<\u002Fspan><span>Shopify<\u002Fspan><span style=\"color:#5a5245\">✳<\u002Fspan><span style=\"color:#a9c4b5\">WordPress<\u002Fspan><span style=\"color:#5a5245\">✳<\u002Fspan><span>Salesforce<\u002Fspan><span style=\"color:#5a5245\">✳<\u002Fspan><span style=\"color:#e8608a\">Mailchimp<\u002Fspan><span style=\"color:#5a5245\">✳<\u002Fspan><span style=\"color:#f2c94c\">Claude<\u002Fspan><span style=\"color:#5a5245\">✳<\u002Fspan><span>Gemini<\u002Fspan><span style=\"color:#5a5245\">✳<\u002Fspan><span style=\"color:#a9c4b5\">ChatGPT<\u002Fspan><span style=\"color:#5a5245\">✳<\u002Fspan><span style=\"color:#e8608a\">IA aplicada al marketing<\u002Fspan><span style=\"color:#5a5245\">✳<\u002Fspan><\u002Fdiv>\n      <div style=\"display:flex;gap:20px;padding-right:20px;align-items:center\" aria-hidden=\"true\"><span style=\"color:#e8608a\">Meta Ads<\u002Fspan><span style=\"color:#5a5245\">✳<\u002Fspan><span>Google Ads<\u002Fspan><span style=\"color:#5a5245\">✳<\u002Fspan><span style=\"color:#f2c94c\">YouTube Ads<\u002Fspan><span style=\"color:#5a5245\">✳<\u002Fspan><span>Google Analytics<\u002Fspan><span style=\"color:#5a5245\">✳<\u002Fspan><span style=\"color:#a9c4b5\">Search Console<\u002Fspan><span style=\"color:#5a5245\">✳<\u002Fspan><span>Tag Manager<\u002Fspan><span style=\"color:#5a5245\">✳<\u002Fspan><span style=\"color:#e8608a\">Looker Studio<\u002Fspan><span style=\"color:#5a5245\">✳<\u002Fspan><span>Power BI<\u002Fspan><span style=\"color:#5a5245\">✳<\u002Fspan><span style=\"color:#f2c94c\">SEMrush<\u002Fspan><span style=\"color:#5a5245\">✳<\u002Fspan><span>Shopify<\u002Fspan><span style=\"color:#5a5245\">✳<\u002Fspan><span style=\"color:#a9c4b5\">WordPress<\u002Fspan><span style=\"color:#5a5245\">✳<\u002Fspan><span>Salesforce<\u002Fspan><span style=\"color:#5a5245\">✳<\u002Fspan><span style=\"color:#e8608a\">Mailchimp<\u002Fspan><span style=\"color:#5a5245\">✳<\u002Fspan><span style=\"color:#f2c94c\">Claude<\u002Fspan><span style=\"color:#5a5245\">✳<\u002Fspan><span>Gemini<\u002Fspan><span style=\"color:#5a5245\">✳<\u002Fspan><span style=\"color:#a9c4b5\">ChatGPT<\u002Fspan><span style=\"color:#5a5245\">✳<\u002Fspan><span style=\"color:#e8608a\">IA aplicada al marketing<\u002Fspan><span style=\"color:#5a5245\">✳<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section style=\"max-width:1180px;margin:0 auto;padding:34px 40px 20px;display:grid;grid-template-columns:repeat(3,1fr);gap:14px\">\n  <div style=\"background:#fff;border:1px solid rgba(0,0,0,.08);border-radius:14px;padding:18px 22px\"><span style=\"font:800 40px 'Bricolage Grotesque';line-height:1;color:#e8608a\">+10 años<\u002Fspan><p style=\"font:500 14px/1.4 'Archivo';color:#5a5142;margin:8px 0 0\">liderando estrategias basadas en datos<\u002Fp><\u002Fdiv>\n  <div style=\"background:#fff;border:1px solid rgba(0,0,0,.08);border-radius:14px;padding:18px 22px\"><span style=\"font:800 34px 'Bricolage Grotesque';line-height:1;color:#2f5d4a\">Búsqueda 360°<\u002Fspan><p style=\"font:500 14px/1.4 'Archivo';color:#5a5142;margin:8px 0 0\">Aparecés cuando te buscan (posicionamiento orgánico) y competís donde se decide la compra (anuncios pagos).<\u002Fp><\u002Fdiv>\n  <div style=\"background:#fff;border:1px solid rgba(0,0,0,.08);border-radius:14px;padding:18px 22px\"><span style=\"font:800 46px 'Bricolage Grotesque';line-height:1;color:#1a1a1a\">1:1<\u002Fspan><p style=\"font:500 14px/1.4 'Archivo';color:#5a5142;margin:8px 0 0\">punto de contacto único — estrategia de punta a punta<\u002Fp><\u002Fdiv>\n<\u002Fsection>\n\n<section id=\"servicios\" style=\"padding:56px 40px;background:#2f5d4a;color:#f4ede4;margin-top:28px\">\n  <div style=\"max-width:1180px;margin:0 auto\">\n    <div style=\"display:flex;justify-content:space-between;align-items:baseline;margin-bottom:30px;flex-wrap:wrap;gap:10px\">\n      <h2 style=\"font:800 46px 'Bricolage Grotesque';letter-spacing:-.025em;margin:0\">Servicios<\u002Fh2>\n      <span style=\"font:400 12px 'Space Mono',monospace;letter-spacing:.14em;color:#a9c4b5;text-transform:uppercase\">Lo que hago por tu marca<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:1px;background:rgba(244,237,228,.2);border:1px solid rgba(244,237,228,.2)\">\n      <div style=\"background:#2f5d4a;padding:32px 28px\"><span style=\"font:700 14px 'Space Mono',monospace;color:#e8608a\">01<\u002Fspan><h3 style=\"font:700 26px 'Bricolage Grotesque';margin:10px 0 8px\">Publicidad paga<\u002Fh3><p style=\"font:400 15px/1.55 'Archivo';color:#cfe0d6;margin:0\">Campañas en Meta (Instagram, Facebook y WhatsApp) y Google orientadas a conseguir contactos, ventas y el mejor retorno por cada peso invertido.<\u002Fp><\u002Fdiv>\n      <div style=\"background:#2f5d4a;padding:32px 28px\"><span style=\"font:700 14px 'Space Mono',monospace;color:#e8608a\">02<\u002Fspan><h3 style=\"font:700 26px 'Bricolage Grotesque';margin:10px 0 8px\">Estrategia y embudos de venta<\u002Fh3><p style=\"font:400 15px/1.55 'Archivo';color:#cfe0d6;margin:0\">Estrategia de conversión basada en datos: optimizo el recorrido de compra y mido todo con Google Analytics para tomar decisiones con fundamento.<\u002Fp><\u002Fdiv>\n      <div style=\"background:#2f5d4a;padding:32px 28px\"><span style=\"font:700 14px 'Space Mono',monospace;color:#e8608a\">03<\u002Fspan><h3 style=\"font:700 26px 'Bricolage Grotesque';margin:10px 0 8px\">Posicionamiento en Google y contenido<\u002Fh3><p style=\"font:400 15px/1.55 'Archivo';color:#cfe0d6;margin:0\">SEO (posicionar tu sitio en los resultados orgánicos de Google): aparecés en las búsquedas sin pagar por cada clic, con contenido pensado para convertir.<\u002Fp><\u002Fdiv>\n      <div style=\"background:#2f5d4a;padding:32px 28px\"><span style=\"font:700 14px 'Space Mono',monospace;color:#e8608a\">04<\u002Fspan><h3 style=\"font:700 26px 'Bricolage Grotesque';margin:10px 0 8px\">Tienda online y Web<\u002Fh3><p style=\"font:400 15px/1.55 'Archivo';color:#cfe0d6;margin:0\">Shopify y WordPress: fichas de producto, experiencia de usuario, páginas de venta, maquetación web, control de calidad del embudo de compra y gestión de proyectos de punta a punta.<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section id=\"trabajo\" style=\"padding:64px 40px\">\n  <div style=\"max-width:1180px;margin:0 auto\">\n    <h2 style=\"font:800 46px 'Bricolage Grotesque';letter-spacing:-.025em;margin:0 0 8px\">Cómo trabajo<\u002Fh2>\n    <p style=\"font:500 clamp(12px,1.6vw,18px)/1.55 'Archivo';color:#3a3229;max-width:100%;margin:0 0 36px;white-space:nowrap\">Cada peso invertido con intención, medido y optimizado. Crecemos juntos, a tu ritmo — sin fórmulas genéricas.<\u002Fp>\n    <div style=\"display:flex;gap:18px;flex-wrap:wrap\">\n      <div style=\"flex:1;min-width:200px;border-top:3px solid #1a1a1a;padding-top:16px\"><span style=\"font:700 13px 'Space Mono',monospace;color:#e8608a\">PASO 01<\u002Fspan><h4 style=\"font:700 20px 'Bricolage Grotesque';margin:8px 0 6px\">Diagnóstico<\u002Fh4><p style=\"font:400 14px/1.5 'Archivo';color:#6a5f4e;margin:0\">Entiendo tu marca, tu objetivo y tu presupuesto real.<\u002Fp><\u002Fdiv>\n      <div style=\"flex:1;min-width:200px;border-top:3px solid #1a1a1a;padding-top:16px\"><span style=\"font:700 13px 'Space Mono',monospace;color:#e8608a\">PASO 02<\u002Fspan><h4 style=\"font:700 20px 'Bricolage Grotesque';margin:8px 0 6px\">Estrategia a medida<\u002Fh4><p style=\"font:400 14px/1.5 'Archivo';color:#6a5f4e;margin:0\">Un plan a tu escala, sin fórmulas prearmadas.<\u002Fp><\u002Fdiv>\n      <div style=\"flex:1;min-width:200px;border-top:3px solid #1a1a1a;padding-top:16px\"><span style=\"font:700 13px 'Space Mono',monospace;color:#e8608a\">PASO 03<\u002Fspan><h4 style=\"font:700 20px 'Bricolage Grotesque';margin:8px 0 6px\">Empezamos con foco<\u002Fh4><p style=\"font:400 14px/1.5 'Archivo';color:#6a5f4e;margin:0\">Validamos con inversión medida antes de escalar.<\u002Fp><\u002Fdiv>\n      <div style=\"flex:1;min-width:200px;border-top:3px solid #e8608a;padding-top:16px\"><span style=\"font:700 13px 'Space Mono',monospace;color:#e8608a\">PASO 04<\u002Fspan><h4 style=\"font:700 20px 'Bricolage Grotesque';margin:8px 0 6px\">Escalamos con datos<\u002Fh4><p style=\"font:400 14px/1.5 'Archivo';color:#6a5f4e;margin:0\">Subimos la inversión a medida que llegan los resultados.<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"margin-top:40px;background:#e8608a;border-radius:18px;padding:44px 40px;display:flex;align-items:center;gap:30px;flex-wrap:wrap\">\n      <span style=\"font:800 60px 'Bricolage Grotesque';color:#fff;line-height:1\">✳<\u002Fspan>\n      <p style=\"flex:1;min-width:300px;font:600 26px/1.35 'Bricolage Grotesque';color:#fff;margin:0;letter-spacing:-.01em\">Que tu marca no invierta por invertir, sino a medida que ve resultados. Cada decisión, respaldada por datos.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section style=\"max-width:1180px;margin:36px auto 0;padding:0 40px\">\n  <span style=\"display:block;text-align:center;font:700 10px 'Space Mono',monospace;letter-spacing:.14em;color:#8a8070;text-transform:uppercase;margin-bottom:8px\">Publicidad<\u002Fspan>\n  <ins class=\"adsbygoogle flo-ad\" style=\"display:block;width:100%;min-width:250px;min-height:100px\" data-ad-client=\"ca-pub-XXXXXXXXXXXXXXXX\" data-ad-slot=\"0000000000\" data-ad-format=\"auto\" data-full-width-responsive=\"true\"><\u002Fins>\n<\u002Fsection>\n\n<section id=\"blog-teaser\" style=\"padding:64px 40px;background:#fff;border-top:1px solid rgba(0,0,0,.06);border-bottom:1px solid rgba(0,0,0,.06)\">\n  <div style=\"max-width:1180px;margin:0 auto\">\n    <div style=\"display:flex;justify-content:space-between;align-items:baseline;margin-bottom:26px;flex-wrap:wrap;gap:10px\">\n      <div>\n        <span style=\"font:400 12px 'Space Mono',monospace;letter-spacing:.16em;color:#2f5d4a;text-transform:uppercase\">Mantenete al día<\u002Fspan>\n        <h2 style=\"font:800 46px 'Bricolage Grotesque';letter-spacing:-.025em;margin:6px 0 0\">Lo que tenés que saber<\u002Fh2>\n      <\u002Fdiv>\n      <a href=\"#blog\" style=\"font:700 13px 'Archivo';color:#2f5d4a;border-bottom:2px solid rgba(47,93,74,.35)\">Ver todas →<\u002Fa>\n    <\u002Fdiv>\n    <div id=\"home-blog-grid\" style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:20px\"><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section style=\"max-width:1180px;margin:0 auto;padding:0 40px 8px\">\n  <span style=\"display:block;text-align:center;font:700 10px 'Space Mono',monospace;letter-spacing:.14em;color:#8a8070;text-transform:uppercase;margin-bottom:8px\">Publicidad<\u002Fspan>\n  <ins class=\"adsbygoogle flo-ad\" style=\"display:block;width:100%;min-width:250px;min-height:100px\" data-ad-client=\"ca-pub-XXXXXXXXXXXXXXXX\" data-ad-slot=\"0000000001\" data-ad-format=\"auto\" data-full-width-responsive=\"true\"><\u002Fins>\n<\u002Fsection>\n\n<section id=\"contacto\" style=\"padding:64px 40px\">\n  <div style=\"max-width:1180px;margin:0 auto;display:grid;grid-template-columns:1fr 1.1fr;gap:48px;align-items:start\">\n    <div>\n      <span style=\"font:400 12px 'Space Mono',monospace;letter-spacing:.16em;color:#2f5d4a;text-transform:uppercase\">Trabajemos juntos<\u002Fspan>\n      <h2 style=\"font:800 56px 'Bricolage Grotesque';letter-spacing:-.03em;line-height:.98;margin:14px 0 18px\">Contame sobre<br>tu marca.<\u002Fh2>\n      <p style=\"font:500 17px/1.55 'Archivo';color:#3a3229;max-width:400px;margin:0 0 30px\">Completá el formulario " style=\"font:700 12px 'Space Mono',monospace;letter-spacing:.1em;color:#5a5142;text-transform:uppercase\">Correo<\u002Flabel>\n          <input id=\"f-correo\" type=\"email\" required=\"\" placeholder=\"tu@correo.com\" style=\"padding:13px 15px;border:1px solid rgba(0,0,0,.18);border-radius:10px;font-size:15px;background:#faf7f1\">\n        <\u002Fdiv>\n        <div style=\"flex:1;min-width:180px;display:flex;flex-direction:column;gap:7px\">\n          <label for=\"f-celular\" style=\"font:700 12px 'Space Mono',monospace;letter-spacing:.1em;color:#5a5142;text-transform:uppercase\">Celular<\u002Flabel>\n          <input id=\"f-celular\" type=\"tel\" placeholder=\"Tu número con código de país\" style=\"padding:13px 15px;border:1px solid rgba(0,0,0,.18);border-radius:10px;font-size:15px;background:#faf7f1\">\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:7px\">\n        <label for=\"f-mensaje\" style=\"font:700 12px 'Space Mono',monospace;letter-spacing:.1em;color:#5a5142;text-transform:uppercase\">Cómo te gustaría trabajar juntos<\u002Flabel>\n        <textarea id=\"f-mensaje\" rows=\"4\" required=\"\" placeholder=\"Contame sobre tu marca, tus objetivos y qué te gustaría lograr.\" style=\"padding:13px 15px;border:1px solid rgba(0,0,0,.18);border-radius:10px;font-size:15px;background:#faf7f1;resize:vertical;font-family:'Archivo'\"><\u002Ftextarea>\n      <\u002Fdiv>\n      <button type=\"submit\" style=\"padding:15px;background:#e8608a;color:#fff;border:none;border-radius:30px;font:700 15px 'Archivo';cursor:pointer\">Enviar mensaje<\u002Fbutton>\n      <span id=\"flo-formnote\" style=\"font:500 13px 'Archivo';color:#2f5d4a;text-align:center;min-height:18px\"><\u002Fspan>\n    <\u002Fform>\n  <\u002Fdiv>\n<\u002Fsection>\n<\u002Fdiv>\n\n<!-- ===== VIEW: BLOG LIST ===== -->\n<div data-view=\"blog\">\n  <section style=\"padding:56px 40px 40px;max-width:1180px;margin:0 auto\">\n    <span style=\"font:400 12px 'Space Mono',monospace;letter-spacing:.16em;color:#2f5d4a;text-transform:uppercase\">Mantenete al día<\u002Fspan>\n    <h1 style=\"font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:56px;line-height:.98;letter-spacing:-.03em;margin:14px 0 12px\">Lo que cambia y <span style=\"color:#e8608a;font-style:italic\">tenés que saber<span style=\"color:#2f5d4a;font-style:normal\">.<\u002Fspan><\u002Fspan><\u002Fh1>\n    <p style=\"font:500 17px/1.55 'Archivo';color:#3a3229;max-width:640px;margin:0\">Cambios de plataformas, tendencias y datos que impactan tus campañas — explicados con casos reales, para que no te agarren de sorpresa.<\u002Fp>\n  <\u002Fsection>\n  <section style=\"max-width:1180px;margin:0 auto;padding:0 40px 30px\">\n    <span style=\"display:block;text-align:center;font:700 10px 'Space Mono',monospace;letter-spacing:.14em;color:#8a8070;text-transform:uppercase;margin-bottom:8px\">Publicidad<\u002Fspan>\n    <ins class=\"adsbygoogle flo-ad\" style=\"display:block;width:100%;min-width:250px;min-height:100px\" data-ad-client=\"ca-pub-XXXXXXXXXXXXXXXX\" data-ad-slot=\"0000000002\" data-ad-format=\"auto\" data-full-width-responsive=\"true\"><\u002Fins>\n  <\u002Fsection>\n  <section style=\"max-width:1180px;margin:0 auto;padding:0 40px 80px\">\n    <div id=\"blog-list-grid\" style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:28px\"><\u002Fdiv>\n  <\u002Fsection>\n<\u002Fdiv>\n\n<!-- ===== VIEW: BLOG POST ===== -->\n<div data-view=\"post\">\n  <article id=\"post-article\" style=\"max-width:760px;margin:0 auto;padding:56px 40px 20px\"><\u002Farticle>\n<\u002Fdiv>\n\n<footer style=\"padding:34px 40px;background:#1a1a1a;color:#c9c0b0;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:14px\">\n  <span style=\"font:800 16px 'Bricolage Grotesque';color:#f4ede4\">Florencia Bugarin D'Angelo<\u002Fspan>\n  <span style=\"font:400 12px 'Space Mono',monospace;color:#8a8070\">Performance Marketing &amp; Growth · Worldwide · © 2026<\u002Fspan>\n<\u002Ffooter>\n\n<\u002Fdiv>\n\n<script>\nconst posts = [\n  { slug: 'whatsapp-usuario', tag: 'Redes', title: \"WhatsApp ahora pide crear un usuario: qué cambia para tu marca\", excerpt: \"Cómo adaptar tu perfil de negocio antes de que el cambio te tome desprevenida.\", meta: '5 min · Jun 2026',\n    body: [\n      \"WhatsApp está migrando de números de teléfono a nombres de usuario como identidad principal dentro de la app. Para una persona es un cambio menor; para una marca que vive de WhatsApp Business, es un cambio de fondo: el enlace que compartís en bio, en anuncios y en tarjetas ya no depende de un número que podés perder o cambiar de operador.\",\n      \"Lo primero es reservar el usuario antes de que otro lo haga. Elegí uno que coincida con tu handle de Instagram o tu dominio — la consistencia entre plataformas es, en sí misma, una señal de confianza para quien te encuentra por primera vez.\",\n      \"Segundo: revisá dónde tenés el número \\\"hardcodeado\\\". Landing pages, firmas de mail, cartelería, anuncios activos de Meta con el botón de WhatsApp. Si el usuario reemplaza al número como identificador público, esos links deberían apuntar al nuevo formato para no perder clics en el camino.\",\n      \"Por último, aprovechá el momento para limpiar tu perfil de negocio: catálogo actualizado, horarios, respuesta automática. Un cambio de plataforma es una excusa perfecta para auditar todo lo que rodea ese primer mensaje — que es, para muchas marcas, el verdadero comienzo del embudo de ventas.\",\n    ]},\n  { slug: 'mundial-pantallas', tag: 'Publicidad', title: \"Lo que enseñan las pantallas del Mundial sobre segmentar por ubicación\", excerpt: \"Un mismo partido, un anuncio distinto según el país que mira: la lección para tus campañas.\", meta: '6 min · Jun 2026',\n    body: [\n      \"Durante los partidos del Mundial, las carteleras LED que rodean la cancha no muestran siempre lo mismo. La señal que llega a cada país lleva una publicidad distinta, elegida según quién está mirando desde ese lugar — la misma cancha, el mismo minuto de partido, un mensaje diferente según la audiencia.\",\n      \"Es la misma lógica detrás de la segmentación geográfica en Meta Ads y Google Ads, solo que a una escala mucho más accesible. No hace falta ser un patrocinador oficial para aplicarla: podés mostrar un precio en pesos a quien busca desde Argentina y un precio en dólares a quien busca desde afuera, o adaptar el llamado a la acción según si hay stock local o hay que coordinar envío internacional.\",\n      \"El error más común es tratar a toda la audiencia como si mirara desde el mismo lugar. Cuando separás las campañas por país, ciudad o incluso radio alrededor de un local físico, el mensaje deja de ser genérico — y un mensaje específico siempre convierte mejor que uno que le habla a todos por igual.\",\n      \"La otra lección del Mundial es de timing: la cartelera cambia con el partido, no una vez por temporada. Tus campañas también deberían revisarse con esa frecuencia — estacionalidad, feriados locales, eventos puntuales — en vez de dejarlas corriendo igual todo el año.\",\n    ]},\n  { slug: 'presupuesto-ads', tag: 'Estrategia', title: \"Cuánto invertir en ads cuando estás empezando\", excerpt: \"La lógica de escalar el presupuesto a medida que llegan resultados, explicada paso a paso.\", meta: '4 min · May 2026',\n    body: [\n      \"La pregunta que más recibo de marcas que recién empiezan con publicidad paga no es \\\"qué plataforma uso\\\" sino \\\"cuánto tengo que invertir\\\". Y la respuesta corta es: menos de lo que pensás, al principio.\",\n      \"La estrategia que mejor funciona es empezar con un presupuesto acotado, pensado para validar — no para vender en volumen. En esta primera etapa el objetivo es aprender qué mensaje, qué imagen y qué audiencia funcionan mejor para tu marca puntual, con datos reales en vez de suposiciones.\",\n      \"Recién cuando ese primer tramo muestra resultados consistentes — un costo por resultado sostenible, una audiencia que responde — tiene sentido escalar la inversión. Subir presupuesto antes de tener esa validación solo amplifica un mensaje que todavía no sabemos si funciona.\",\n      \"En la práctica: arrancar con foco, medir con Google Analytics y el panel de la plataforma, y subir la inversión en la medida en que el retorno lo justifica. Es la misma idea que aplico con cada marca con la que trabajo — invertir a medida que se ven resultados, no al revés.\",\n    ]},\n];\n\nconst stripeCss = 'repeating-linear-gradient(135deg,#e3d5c1,#e3d5c1 10px,#d9c8ae 10px,#d9c8ae 20px)';\n\nfunction cardHTML(p, big) {\n  return '<a href=\"#post/' + p.slug + '\" style=\"display:block;color:inherit\">' +\n    '<div style=\"width:100%;aspect-ratio:16/10;border-radius:12px;background:' + stripeCss + ';display:flex;align-items:center;justify-content:center;font:700 10px \\'Space Mono\\',monospace;color:#8a7757;text-align:center;padding:10px\">imagen: ' + p.tag + '<\u002Fdiv>' +\n    '<span style=\"font:700 10px \\'Space Mono\\',monospace;letter-spacing:.1em;text-transform:uppercase;color:#2f5d4a;display:block;margin-top:14px\">' + p.tag + '<\u002Fspan>' +\n    '<h3 style=\"font:700 20px \\'Bricolage Grotesque\\';letter-spacing:-.01em;margin:8px 0 6px;line-height:1.18\">' + p.title + '<\u002Fh3>' +\n    '<p style=\"font:400 13px/1.5 \\'Archivo\\';color:#5a5142;margin:0\">' + p.excerpt + '<\u002Fp>' +\n    '<\u002Fa>';\n}\n\nfunction renderHomeBlog() {\n  document.getElementById('home-blog-grid').innerHTML = posts.map(p => cardHTML(p)).join('');\n}\nfunction renderBlogList() {\n  document.getElementById('blog-list-grid').innerHTML = posts.map(p => cardHTML(p)).join('');\n}\nfunction renderPost(slug) {\n  const p = posts.find(x => x.slug === slug) || posts[0];\n  const related = posts.filter(x => x.slug !== p.slug);\n  document.title = p.title + \" — Florencia Bugarin D'Angelo\";\n  const el = document.getElementById('post-article');\n  el.inner viewBox=\"0 0 24 24\" fill=\"#f4ede4\"><path d=\"M22 12.06C22 6.51 17.52 2 12 2S2 6.51 2 12.06c0 5 3.66 9.15 8.44 9.94v-7.03H7.9v-2.91h2.54V9.85c0-2.51 1.49-3.9 3.77-3.9 1.09 0 2.24.2 2.24.2v2.46h-1.26c-1.24 0-1.63.77-1.63 1.56v1.89h2.78l-.44 2.91h-2.34V22c4.78-.79 8.44-4.94 8.44-9.94Z\"/><\u002Fsvg><\u002Fa>' +\n    '<a href=\"' + links.linkedin + '\" target=\"_blank\" rel=\"noopener\" title=\"LinkedIn\" style=\"width:32px;height:32px;border-radius:50%;background:#2f5d4a;display:flex;align-items:center;justify-content:center\"><svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"#f4ede4\"><path d=\"M20.45 20.45h-3.55v-5.57c0-1.33-.02-3.04-1.85-3.04-1.85 0-2.14 1.45-2.14 2.94v5.67H9.36V9h3.41v1.56h.05c.48-.9 1.64-1.85 3.37-1.85 3.6 0 4.27 2.37 4.27 5.45v6.29ZM5.34 7.43a2.06 2.06 0 1 1 0-4.12 2.06 2.06 0 0 1 0 4.12ZM7.12 20.45H3.56V9h3.56v11.45Z\"/><\u002Fsvg><\u002Fa>' +\n    '<a href=\"' + links.email + '\" title=\"Correo\" style=\"width:32px;height:32px;border-radius:50%;background:#2f5d4a;display:flex;align-items:center;justify-content:center\"><svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#f4ede4\" stroke-width=\"2\"><rect x=\"2.5\" y=\"4.5\" width=\"19\" height=\"15\" rx=\"2.5\"/><path d=\"M3.5 6.5 12 13l8.5-6.5\"/><\u002Fsvg><\u002Fa>';\n  const copyBtn = share.querySelector('[data-copy]');\n  copyBtn.addEventListener('click', (e) => {\n    e.preventDefault();\n    navigator.clipboard && navigator.clipboard.writeText(url);\n    copyBtn.title = '¡Link copiado! Pegalo en tu historia de Instagram';\n  });\n}\n\nfunction pushAds() {\n  requestAnimationFrame(() => {\n    document.querySelectorAll('ins.flo-ad:not([data-ad-loaded])').forEach(ins => {\n      const r = ins.getBoundingClientRect();\n      if (r.width < 100 || getComputedStyle(ins.closest('[data-view]') || ins).display === 'none') return;\n      ins.setAttribute('data-ad-loaded', '1');\n      try { (window.adsbygoogle = window.adsbygoogle || []).push({}); } catch (e
